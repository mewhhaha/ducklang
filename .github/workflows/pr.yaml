name: pr

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      XDG_CACHE_HOME: /tmp/ducklang-tree-sitter-cache
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: format
        run: deno fmt --check

      - name: lint
        run: deno lint --ignore=.claude

      - name: typecheck
        run: |
          deno check main.ts duck.ts
          deno check scripts/*.ts
          rg --files src case-studies examples -g '*.test.ts' -0 | xargs -0 deno check

      - name: install wabt
        run: |
          sudo apt-get update -qq >/tmp/apt.log 2>&1
          sudo apt-get install -y -qq wabt >>/tmp/apt.log 2>&1

      - name: install tree-sitter
        run: npm install --global tree-sitter-cli@0.26.3

      - name: check grammar
        run: |
          cd tree-sitter-duck
          tree-sitter generate
          tree-sitter test
          rg --files ../examples -g '*.duck' -0 | xargs -0 tree-sitter parse --quiet --stat
          tree-sitter parse --quiet --stat ../src/frontend/prelude*.duck
          tree-sitter query queries/highlights.scm ../examples/effects/01_inferred_io.duck ../examples/handlers/01_local_counter.duck >/dev/null
          tree-sitter query queries/indents.scm ../examples/effects/01_inferred_io.duck ../examples/handlers/01_local_counter.duck >/dev/null
          tree-sitter query queries/textobjects.scm ../examples/effects/01_inferred_io.duck ../examples/handlers/01_local_counter.duck >/dev/null
          tree-sitter query queries/locals.scm ../examples/effects/01_inferred_io.duck ../examples/handlers/01_local_counter.duck >/dev/null
          tree-sitter query queries/tags.scm ../examples/effects/01_inferred_io.duck ../examples/handlers/01_local_counter.duck >/dev/null
          tree-sitter query queries/rainbows.scm ../examples/effects/01_inferred_io.duck ../examples/handlers/01_local_counter.duck >/dev/null
          cd ..
          git diff --exit-code -- tree-sitter-duck/src/grammar.json tree-sitter-duck/src/node-types.json tree-sitter-duck/src/parser.c

      - name: run tests
        run: deno test --allow-read --allow-write --allow-run

      - name: enforce LSP performance budgets
        run: deno task lsp:perf

      - name: enforce compiler performance budgets
        run: deno task compiler:perf
