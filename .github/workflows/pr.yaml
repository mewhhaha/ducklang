name: pr

on:
  pull_request:

jobs:
  quality-and-grammar:
    runs-on: ubuntu-latest
    env:
      XDG_CACHE_HOME: /tmp/ducklang-tree-sitter-cache
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.2

      - name: install ripgrep
        run: |
          sudo apt-get update -qq >/tmp/apt.log 2>&1
          sudo apt-get install -y -qq ripgrep >>/tmp/apt.log 2>&1

      - name: install tree-sitter
        run: npm install --global tree-sitter-cli@0.26.3

      - name: quality
        run: |
          deno fmt --check
          deno lint --ignore=.claude
          deno check main.ts duck.ts
          deno check scripts/*.ts
          rg --files src case-studies examples -g '*.test.ts' -0 | xargs -0 deno check
          deno run --allow-read scripts/dependency-boundaries.ts --check >/dev/null

      - name: grammar
        run: |
          deno run --allow-read --allow-write --allow-run=tree-sitter scripts/check-generated-grammar.ts
          cd tree-sitter-duck
          tree-sitter test
          rg --files ../examples -g '*.duck' -0 | xargs -0 tree-sitter parse --quiet --stat
          tree-sitter parse --quiet --stat ../src/frontend/prelude*.duck
          tree-sitter query queries/highlights.scm ../examples/effects/01_inferred_io.duck ../examples/handlers/01_local_counter.duck >/dev/null
          tree-sitter query queries/indents.scm ../examples/effects/01_inferred_io.duck ../examples/handlers/01_local_counter.duck >/dev/null
          tree-sitter query queries/textobjects.scm ../examples/effects/01_inferred_io.duck ../examples/handlers/01_local_counter.duck >/dev/null
          tree-sitter query queries/locals.scm ../examples/effects/01_inferred_io.duck ../examples/handlers/01_local_counter.duck >/dev/null
          tree-sitter query queries/tags.scm ../examples/effects/01_inferred_io.duck ../examples/handlers/01_local_counter.duck >/dev/null
          tree-sitter query queries/rainbows.scm ../examples/effects/01_inferred_io.duck ../examples/handlers/01_local_counter.duck >/dev/null

  source-and-examples:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.2

      - name: install wabt
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/WebAssembly/wabt/releases/download/1.0.41/wabt-1.0.41-linux-x64.tar.gz \
            --output /tmp/wabt-1.0.41-linux-x64.tar.gz
          echo "83f8122e924745fcd70636e3594bc01c4c47f2d4c8f3c63b5d70d3f83a482677  /tmp/wabt-1.0.41-linux-x64.tar.gz" \
            | sha256sum --check
          tar --extract --gzip \
            --file /tmp/wabt-1.0.41-linux-x64.tar.gz \
            --directory /tmp
          echo "/tmp/wabt-1.0.41/bin" >> "$GITHUB_PATH"

      - name: run source and example tests
        run: deno test --allow-read --allow-write --allow-run src examples scripts

  case-studies:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        study:
          - chip8
          - grep
          - raytracer
          - tar
          - wav
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.2

      - name: install wabt
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/WebAssembly/wabt/releases/download/1.0.41/wabt-1.0.41-linux-x64.tar.gz \
            --output /tmp/wabt-1.0.41-linux-x64.tar.gz
          echo "83f8122e924745fcd70636e3594bc01c4c47f2d4c8f3c63b5d70d3f83a482677  /tmp/wabt-1.0.41-linux-x64.tar.gz" \
            | sha256sum --check
          tar --extract --gzip \
            --file /tmp/wabt-1.0.41-linux-x64.tar.gz \
            --directory /tmp
          echo "/tmp/wabt-1.0.41/bin" >> "$GITHUB_PATH"

      - name: run case study
        run: deno test --allow-read --allow-write --allow-run case-studies/${{ matrix.study }}

  performance:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.2

      - name: enforce performance budgets
        run: |
          deno task compiler:perf
          deno task lsp:perf
